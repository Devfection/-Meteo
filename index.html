<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>

    <title>Meteo</title>
    <link rel="stylesheet" href="src/index.css">
    </head>
    <div class="button">
               <button class="dark-mode-button">dark mode</button>
    </div>
     <div class ="weather-app">
    <header> 
        <form id="form">
        <input type="search" placeholder="Enter a city"
        required
        class = "city-input"
        id="search-form">
        <input type = "submit"
        value="Search"
        class="city-submit"
        id="search-button" >
        </form>
    </header>
    <body>
         <div class="weather-details">
             <div>
                <h1 class="current-city" id="current-city"></h1>
                
                <p>
                    <span id="time" ></span>
                    <span id="description"> %</span> <br/>
                    Humidity: <span class="accent" id="humidity"> </span><br/>
                    Wind:  <span class="accent" id="wind">  </span>
                 </p> 
                 </div>
                 <span class="degrees">
            <div class="weather-app-temperature-container">
            <div id="icon"></div>
            <div class="weather-app-temperature" id="temperature"></div>
            <div class="weather-app-unit">°C</div>
          </div>
            </span>
        </div>


<footer><p>
          This project was coded by

        </p></footer>
        <script src="src/meteo.js"></script>
    </body>
</div>
    </html>
